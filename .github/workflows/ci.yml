name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: hitchlink_mobileApp

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: hitchlink_mobileApp/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci --reporters=default --maxWorkers=2
